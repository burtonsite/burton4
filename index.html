<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ULT</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Vazirmatn:wght@300;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #00f2ff; /* Cyan */
      --secondary: #7000ff; /* Purple */
      --bg-deep: #020205;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e0e0ff;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; cursor: none; }

    body {
      margin: 0;
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Vazirmatn', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* --- CUSTOM CURSOR --- */
    #cursor {
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
    }
    #cursor-follower {
      width: 40px; height: 40px;
      border: 1px solid var(--secondary);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.15s ease, width 0.3s, height 0.3s;
    }

    /* --- BACKGROUND --- */
    #canvas-bg { position: fixed; inset: 0; z-index: -1; }

    /* --- BOOT SCREEN --- */
    #boot-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-deep);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      transition: 0.8s ease;
    }
    .boot-text {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      letter-spacing: 5px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* --- MAIN LAYOUT --- */
    .main-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      justify-content: center;
    }

    .cyber-card {
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 400px 1fr;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    @media (max-width: 900px) {
      .cyber-card { grid-template-columns: 1fr; }
    }

    /* --- SIDEBAR --- */
    .sidebar {
      background: rgba(0, 0, 0, 0.3);
      padding: 50px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-left: 1px solid var(--glass-border);
    }

    .avatar-container {
      position: relative;
      width: 220px; height: 220px;
      margin-bottom: 30px;
    }

    .avatar-ring {
      position: absolute; inset: -10px;
      border: 2px solid transparent;
      border-top: 2px solid var(--primary);
      border-bottom: 2px solid var(--secondary);
      border-radius: 50%;
      animation: rotateRing 4s linear infinite;
    }
    @keyframes rotateRing { 100% { transform: rotate(360deg); } }

    .avatar-wrapper {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      border: 4px solid var(--bg-deep);
    }

    .avatar-wrapper img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .glitch-overlay {
      position: absolute; inset: 0;
      background: var(--primary);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .social-links { display: flex; gap: 15px; margin-top: 20px; }

    .social-icon {
      width: 45px; height: 45px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      display: grid; place-items: center;
      color: var(--text-main);
      text-decoration: none;
      transition: 0.3s;
    }

    .social-icon:hover {
      background: var(--primary);
      color: var(--bg-deep);
      transform: translateY(-5px) rotate(10deg);
      box-shadow: 0 0 20px var(--primary);
    }

    /* --- CONTENT --- */
    .content { padding: 50px; }

    .name-glitch {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      margin: 0;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .typing-text {
      font-size: 1.2rem;
      color: var(--primary);
      margin-bottom: 30px;
      min-height: 1.5em;
    }

    /* --- SKILLS --- */
    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }

    .skill-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid var(--glass-border);
    }

    .skill-info {
      display: flex; justify-content: space-between;
      margin-bottom: 8px; font-size: 0.9rem;
    }

    .skill-bar-bg {
      height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden;
    }

    .skill-bar-fill {
      height: 100%; width: 0;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      transition: width 2s cubic-bezier(0.1, 0, 0.3, 1);
    }

    .cyber-btn {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      margin: 10px 5px;
      transition: 0.3s;
    }

    .cyber-btn:hover {
      background: var(--primary);
      color: var(--bg-deep);
      box-shadow: 0 0 15px var(--primary);
    }

  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-follower"></div>
  <canvas id="canvas-bg"></canvas>

  <div id="boot-screen">
    <div class="boot-text">INITIALIZING SYSTEM...<br><small style="font-size: 0.5em; color: var(--text-dim);">[ CLICK TO DECRYPT ]</small></div>
  </div>

  <div class="main-container">
    <div class="cyber-card">
      <div class="sidebar">
        <div class="avatar-container">
          <div class="avatar-ring"></div>
          <div class="avatar-wrapper">
            <div class="glitch-overlay" id="glitch-overlay"></div>
            <img id="main-avatar" src="G1 .gif" alt="Profile">
          </div>
        </div>
        
        <h2 style="font-family: 'Orbitron'; margin: 0; font-size: 1.2rem;">BuRTon | ShaDMer </h2>
        <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 20px;">why i'm create this site?🥴</p>

        <div class="social-links">
          <a href="https://github.com/burtonsite" class="social-icon"><i class="fa-brands fa-github"></i></a>
          <a href="https://t.me/B6T09" class="social-icon"><i class="fa-brands fa-telegram"></i></a>
          <a href="https://www.instagram.com/bur7on.exe?igsh=MXN5NHpyMjlkZWFtNw==" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
        </div>

        <div style="margin-top: 30px;">
          <button class="cyber-btn" onclick="changeAvatar(-1)">PREV</button>
          <button class="cyber-btn" onclick="changeAvatar(1)">NEXT</button>
        </div>
      </div>

      <div class="content">
        <h1 class="name-glitch" id="user-name">SITE IS UPDATE</h1>
        <div class="typing-text" id="typing-el"></div>

        <p style="line-height: 1.8; color: var(--text-dim);">
          “NO INFORMATIONS”
        </p>

        <h3 style="font-family: 'Orbitron'; margin-top: 40px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">Percentage Of Language Proficiency</h3>

        <div class="skills-grid">
          <div class="skill-item">
            <div class="skill-info"><span>Cyber Security</span><span>0%</span></div>
            <div class="skill-bar-bg"><div class="skill-bar-fill" data-width="88.6%"></div></div>
          </div>
          <div class="skill-item">
            <div class="skill-info"><span>LINUX WITH TOOLS</span><span>0%</span></div>
            <div class="skill-bar-bg"><div class="skill-bar-fill" data-width="97%"></div></div>
          </div>
          <div class="skill-item">
            <div class="skill-info"><span>PYTHON/AI</span><span>0%</span></div>
            <div class="skill-bar-bg"><div class="skill-bar-fill" data-width="88%"></div></div>
          </div>
          <div class="skill-item">
            <div class="skill-info"><span>WEB</span><span>0%</span></div>
            <div class="skill-bar-bg"><div class="skill-bar-fill" data-width="73%"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="bg-music" loop>
    <source src="" type="audio/mpeg">
  </audio>

  <script>
    // --- DATA ---
    
    const images = ["G1 .gif", "G5", "G4"];
    let currentImgIdx = 0;

    // --- CURSOR LOGIC ---
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      setTimeout(() => {
        follower.style.left = e.clientX - 16 + 'px';
        follower.style.top = e.clientY - 16 + 'px';
      }, 50);
    });

    // --- CANVAS BACKGROUND ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.speedY = Math.random() * 0.5 - 0.25;
        this.color = Math.random() > 0.5 ? '#00f2ff' : '#7000ff';
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
        if (this.y > canvas.height) this.y = 0;
        if (this.y < 0) this.y = canvas.height;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < 100; i++) particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    initParticles();
    animateParticles();

    // --- AVATAR SYSTEM ---
    function changeAvatar(dir) {
      const overlay = document.getElementById('glitch-overlay');
      const img = document.getElementById('main-avatar');
      
      overlay.style.opacity = '1';
      setTimeout(() => {
        currentImgIdx = (currentImgIdx + dir + images.length) % images.length;
        img.src = images[currentImgIdx];
        overlay.style.opacity = '0';
      }, 300);
    }

    // --- TYPING EFFECT ---
    const text = "Web   |   Developer   | AI   |   CREATE TOOLS";
    let i = 0;
    function typeWriter() {
      if (i < text.length) {
        document.getElementById("typing-el").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
      }
    }

    // --- BOOT & START ---
    window.addEventListener('click', () => {
      const boot = document.getElementById('boot-screen');
      const music = document.getElementById('bg-music');
      
      if (boot) {
        boot.style.opacity = '0';
        setTimeout(() => boot.remove(), 800);
        music.play().catch(() => {});
        
        // Start Animations
        typeWriter();
        document.querySelectorAll('.skill-bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-width');
        });
      }
    }, { once: true });

  </script>
</body>
</html>
